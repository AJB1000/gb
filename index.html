<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Généalogie de la Famille</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        header { background: #2e7d32; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        iframe { width: 100%; height: calc(100% - 70px); border: none; }
        .btn-help { background: white; color: #2e7d32; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <strong>Arbre Généalogique Interactif</strong>
        <a href="https://github.com/AJB1000/gd/main/mon_arbre.ged" class="btn-help">Télécharger le fichier .GED</a>
    </header>

    <script>
        const user = "AJB1000";
        const repo = "gb";
        const gedcomUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/mon_arbre.ged`;
        const topolaUrl = `https://topola-viewer.jabbado.com/?url=${encodeURIComponent(gedcomUrl)}`;
        
        document.write(`<iframe src="${topolaUrl}"></iframe>`);
    </script>
</body>
</html>
