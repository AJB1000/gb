<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Généalogie Familiale</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f6; }
        iframe { width: 100%; height: calc(100% - 70px); border: none; }
        .btn { background-color: #2e7d32; color: white; padding: 5px 5px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px; cursor: pointer; border: none; }
        .btn:hover { background-color: #1b5e20; }
        .loader { color: #666; font-size: 0.9em; margin-top: 10px; }
    </style>

</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <button id="openBtn" class="btn">Mise à jour</button>
        
        <p class="loader">Les données sont chargées en direct depuis GitHub.</p>
    <script>
        document.getElementById('openBtn').addEventListener('click', function() {
            const user = "AJB1000";
            const repo = "gb";
            const file = "genealogie.ged";
            
            // On calcule le timestamp EXACTEMENT au moment du clic
            const timestamp = Date.now(); 
            const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${file}?t=${timestamp}`;
            const topolaUrl = `https://pewu.github.io/topola-viewer/#/view?url=${encodeURIComponent(rawUrl)}`;
            
            // 3. Redirection automatique
            document.write(`<iframe src="${topolaUrl}"></iframe>`);
        });

    </script>
</body>
</html>
