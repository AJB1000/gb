<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Généalogie Familiale</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        .btn { background-color: #2e7d32; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px; cursor: pointer; border: none; }
        .btn:hover { background-color: #1b5e20; }
        .loader { color: #666; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌳 Notre Arbre Généalogique</h1>
        <p>Cliquez sur le bouton ci-dessous pour ouvrir la dernière version à jour.</p>
        
        <button id="openBtn" class="btn">VOIR L'ARBRE (MISE À JOUR)</button>
        
        <p class="loader">Les données sont chargées en direct depuis GitHub.</p>
    </div>

    <script>
        document.getElementById('openBtn').addEventListener('click', function() {
            const user = "AJB1000";
            const repo = "gb";
            const file = "genealogie.ged";
            
            // On calcule le timestamp EXACTEMENT au moment du clic
            const timestamp = Date.now(); 
            const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${file}?t=${timestamp}`;
            const topolaUrl = `https://pewu.github.io/topola-viewer/#/view?url=${encodeURIComponent(rawUrl)}`;
            
            // Redirection
            window.location.href = topolaUrl;
        });
    </script>
</body>
</html>
